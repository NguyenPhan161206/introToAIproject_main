<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku 9x9 AI - ANN vs Traditional Heuristic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
            background: linear-gradient(90deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #888;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
        }

        .board-container {
            flex-shrink: 0;
        }

        .board-wrapper {
            position: relative;
            background: #deb887;
            border-radius: 8px;
            padding: 12px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            width: 450px;
            height: 450px;
            position: relative;
        }

        .cell {
            width: 50px;
            height: 50px;
            position: relative;
            cursor: pointer;
            background: transparent;
            z-index: 1;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
        }

        .grid-line-h {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(0, 0, 0, 0.4);
            transform: translateY(-50%);
            pointer-events: none;
        }

        .grid-line-v {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(0, 0, 0, 0.4);
            transform: translateX(-50%);
            pointer-events: none;
        }

        .stone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }

        .stone.black {
            background: radial-gradient(circle at 35% 35%, #555, #111);
            border: 1px solid #333;
        }

        .stone.white {
            background: radial-gradient(circle at 35% 35%, #fff, #ccc);
            border: 1px solid #aaa;
        }

        .stone.last-move {
            animation: pulse 0.5s ease;
        }

        .stone.last-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 50, 50, 0.7);
        }

        .stone.white.last-move::after {
            background: rgba(255, 50, 50, 0.9);
        }

        .stone.black.last-move::after {
            background: rgba(255, 100, 100, 0.9);
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .cell:hover::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
            pointer-events: none;
        }

        .board.game-over .cell {
            cursor: default;
        }

        .board.thinking .cell {
            cursor: wait;
        }

        .control-panel {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel-box h3 {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9em;
            outline: none;
            cursor: pointer;
        }

        select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        select:focus, input[type="range"]:focus {
            border-color: #e94560;
        }

        .slider-value {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            color: #e94560;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.85em;
        }

        .status-bar .label {
            color: #888;
        }

        .status-bar .value {
            color: #e94560;
            font-weight: bold;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .score-item .score-num {
            font-size: 1.5em;
            font-weight: bold;
        }

        .score-item .score-label {
            font-size: 0.75em;
            color: #888;
        }

        .score-item.player .score-num { color: #4fc3f7; }
        .score-item.ai .score-num { color: #e94560; }
        .score-item.draw .score-num { color: #ffd54f; }

        .game-status {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1em;
        }

        .game-status.playing { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .game-status.player-wins { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; }
        .game-status.ai-wins { background: rgba(233, 69, 96, 0.2); color: #e94560; }
        .game-status.draw { background: rgba(255, 213, 79, 0.2); color: #ffd54f; }

        .ai-vs-ai-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            margin-top: 10px;
        }

        .thinking-indicator {
            display: none;
            text-align: center;
            padding: 5px;
            font-size: 0.85em;
            color: #e94560;
        }

        .thinking-indicator.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .coordinate-label {
            position: absolute;
            font-size: 10px;
            color: rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .coords-h {
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
        }

        .coords-v {
            left: -18px;
            top: 50%;
            transform: translateY(-50%);
        }

        .mode-selector {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .mode-btn.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: #e94560;
        }

        .hidden {
            display: none !important;
        }

        .error-message {
            display: none;
            padding: 8px 12px;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 6px;
            color: #e94560;
            font-size: 0.85em;
            text-align: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 750px) {
            .main-layout {
                flex-direction: column;
                align-items: center;
            }
            .board { width: 360px; height: 360px; }
            .cell { width: 40px; height: 40px; }
            .stone { width: 32px; height: 32px; }
            .control-panel { width: 100%; max-width: 450px; }
        }

        @media (max-width: 450px) {
            .board { width: 270px; height: 270px; }
            .cell { width: 30px; height: 30px; }
            .stone { width: 24px; height: 24px; }
            .stone.last-move::after { width: 6px; height: 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gomoku 9×9 AI</h1>
        <p class="subtitle">ANN Heuristic vs Traditional Heuristic — Minh họa sức mạnh của AI</p>

        <div class="main-layout">
            <div class="board-container">
                <div class="board-wrapper">
                    <div class="board" id="board"></div>
                </div>
            </div>

            <div class="control-panel">
                <div class="panel-box">
                    <h3>Trạng thái</h3>
                    <div class="game-status playing" id="gameStatus">Đang chơi — Lượt của bạn</div>
                    <div class="error-message" id="errorMessage"></div>
                </div>

                <div class="panel-box">
                    <h3>Chế độ chơi</h3>
                    <div class="mode-selector">
                        <button class="mode-btn active" id="modePvaiAnn" {% if not ann_available %}disabled{% endif %}>PvAI (ANN)</button>
                        <button class="mode-btn" id="modePvaiTrad">PvAI (Trad)</button>
                        <button class="mode-btn" id="modePvp">PvP</button>
                    </div>
                </div>

                <div class="panel-box">
                    <h3>Tỉ số</h3>
                    <div class="scoreboard">
                        <div class="score-item player">
                            <div class="score-num" id="playerScore">0</div>
                            <div class="score-label" id="scoreLabel1">BẠN (Đen)</div>
                        </div>
                        <div class="score-item draw">
                            <div class="score-num" id="drawScore">0</div>
                            <div class="score-label">HÒA</div>
                        </div>
                        <div class="score-item ai">
                            <div class="score-num" id="aiScore">0</div>
                            <div class="score-label" id="scoreLabel2">AI (Trắng)</div>
                        </div>
                    </div>
                </div>

                <div id="aiControls">
                    <div class="panel-box">
                        <h3>Cấu hình AI</h3>
                        <label style="font-size:0.85em; color:#aaa;">Độ sâu Minimax</label>
                        <input type="range" id="depthSlider" min="1" max="4" value="3" step="1">
                        <div class="slider-value" id="depthValue">3</div>
                    </div>

                    <div class="status-bar">
                        <span class="label">Thời gian AI</span>
                        <span class="value" id="thinkingTime">—</span>
                    </div>

                    <div class="thinking-indicator" id="thinkingIndicator">
                        <span class="spinner"></span>AI đang suy nghĩ...
                    </div>

                    <div class="ai-vs-ai-section">
                        <button class="btn btn-secondary" id="aiVsAiBtn">AI vs AI (Auto)</button>
                    </div>
                </div>

                <button class="btn btn-primary" id="newGameBtn">Ván Mới</button>

                <div class="status-bar">
                    <span class="label">Số nước</span>
                    <span class="value" id="moveCount">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
